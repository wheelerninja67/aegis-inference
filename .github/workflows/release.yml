name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: aegis-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aegis-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: aegis-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build Aegis
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/aegis_inference${{ contains(matrix.os, 'windows') && '.exe' || '' }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aegis-linux-amd64/aegis_inference
            aegis-darwin-arm64/aegis_inference
            aegis-windows-amd64.exe/aegis_inference.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
